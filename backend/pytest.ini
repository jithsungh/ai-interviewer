[pytest]
# Pytest configuration for AI Interviewer tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Directories to search for tests
testpaths = tests

# Minimum Python version
minversion = 7.0

# Output options
addopts = 
    # Verbose output
    -v
    # Show summary of all test outcomes
    -ra
    # Show local variables in tracebacks
    --showlocals
    # Strict markers (fail on unknown markers)
    --strict-markers
    # Coverage options (optional, requires pytest-cov)
    # --cov=app.config
    # --cov-report=term-missing
    # --cov-report=html

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    config: Configuration-related tests
    slow: Slow running tests

# Test output
console_output_style = progress

# Log configuration
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Timeout (if pytest-timeout is installed)
# timeout = 300

# Warnings
filterwarnings =
    error
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Asyncio configuration (if pytest-asyncio is installed)
asyncio_mode = auto
